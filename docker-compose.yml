services:
  api:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      PORT: 8000
      NODE_ENV: development
    volumes:
      - ./data:/app/data
    develop:
      watch:
        - action: sync
          path: packages/backend/src
          target: /app/packages/backend/src
        - action: rebuild
          path: package.json

  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - api
    develop:
      watch:
        - action: sync
          path: packages/frontend/src
          target: /app/packages/frontend/src
        - action: rebuild
          path: package.json